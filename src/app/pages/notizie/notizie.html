<div class="notizie-page">
  <h1 class="page-title">Notizie</h1>

  @if (notizie().length === 0) {
    <p class="empty-state">Nessuna notizia disponibile.</p>
  }

  <ul class="notizie-list" aria-label="Elenco notizie">
    @for (notizia of notizie(); track notizia.id) {
      <li class="notizia-card">
        <a class="notizia-link" [routerLink]="['/notizie', notizia.id]" [attr.aria-label]="'Leggi: ' + notizia.title">
          @if (notizia.coverImageUrl) {
            <img class="notizia-cover" [src]="notizia.coverImageUrl" [alt]="notizia.title" />
          }
          <div class="notizia-body">
            <div class="notizia-header">
              <span class="notizia-tag" [class]="'tag-' + notizia.tag.toLowerCase()">
                {{ notizia.tag }}
              </span>
              <time class="notizia-data" [attr.datetime]="notizia.publishedAt">
                {{ notizia.publishedAt | date: 'dd/MM/yyyy HH:mm' }}
              </time>
            </div>
            <h2 class="notizia-titolo">{{ notizia.title }}</h2>
          </div>
        </a>
      </li>
    }
  </ul>
</div>
